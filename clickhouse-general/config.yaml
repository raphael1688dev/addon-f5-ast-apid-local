name: "General ClickHouse"
version: "24.8.4-13"
slug: "general_clickhouse"
description: "Standalone ClickHouse DB optimized for local NUC deployment."
arch:
  - amd64
startup: services
boot: auto
init: false
# [FIXED] 修正這裡：privileged 改為具體的權限列表
privileged:
  - SYS_NICE
  - IPC_LOCK
map:
  - config:rw
  - share:rw

ports:
  8123/tcp: 18123
  9000/tcp: 19000

options:
  password: "default_password"
  max_memory_usage: 1000000000
  max_server_memory: 2000000000
schema:
  password: str
  max_memory_usage: int
  max_server_memory: int
