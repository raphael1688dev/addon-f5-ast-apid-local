name: "General ClickHouse"
version: "25.12.4.35-debug-4"
slug: "general_clickhouse"
description: "ClickHouse OLAP Database (Official)"
# image: ... (記得這行要刪掉或註解，如上一步所述)
arch:
  - amd64
startup: services
boot: auto
init: false
map:
  - config:rw
  - share:rw
ports:
  # [關鍵修正] 將容器的 8123 對應到主機的 18123 (避開 HA 本身的 8123)
  8123/tcp: 18123
  # 9000 是 F5 AST Logic 連線用的，維持不變
  9000/tcp: 9000
  9009/tcp: 9009
options:
  password: "default"
  max_memory_usage: 10000000000
  max_server_memory: 10000000000
schema:
  password: str
  max_memory_usage: int
  max_server_memory: int
